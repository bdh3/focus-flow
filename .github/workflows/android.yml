name: Android CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: ${{ github.ref_name }}
        name: Focus Flow ${{ github.ref_name }}
        body: |
          Focus Flow ${{ github.ref_name }} 버전이 출시되었습니다! 🚀
          
          **v1.1.5 주요 업데이트:**
          - 🛡️ **포그라운드 서비스**: 백그라운드 및 화면 꺼짐 상태에서도 끊김 없는 타이머 유지
          - 🧩 **15분 블록 시스템**: 1시간을 4개로 쪼갠 직관적인 가로 배치 레이아웃
          - 🎯 **단일 타이머 원칙**: 몰입 분산 방지를 위해 실행 중 타 작업 접근 제한 (UI 강화)
          - 📉 **범위 축소(Shrink) 로직**: 이미 선택된 블록 클릭 시 이후 범위 자동 해제
          - 📅 **캘린더 자동 연동**: 세션 완료 시 시스템 캘린더에 정확한 시간 기록
          - 📳 **진동 알림 최적화**: 앱 설정과 연동된 커스텀 진동 패턴 적용
          
          **설치 방법:**
          아래 Assets에서 `FocusFlow_v1.1.5.apk` 파일을 다운로드하여 설치해 주세요.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
